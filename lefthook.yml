pre-commit:
  jobs:
    - run: pnpm exec eslint --fix {staged_files}
      glob:
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
        - "*.vue"
      stage_fixed: true
    - run: pnpm exec prettier --write {staged_files}
      glob:
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
        - "*.vue"
        - "*.json"
        - "*.jsonc"
        - "*.css"
      stage_fixed: true
    - run: scripts/check-kebab-imports/target/release/fix-tailwind-quotes
      stage_fixed: true
    - run: scripts/check-kebab-imports/target/release/check-kebab-imports

commit-msg:
  commands:
    lint commit message:
      run: pnpm dlx commitlint --edit "$1"
